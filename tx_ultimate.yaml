substitutions:
  device_name: tx-ultimate
  friendly_name: TX Ultimate

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source:
      type: git
      url: https://github.com/MaestroEngineering/esphome-tx-ultimate
      ref: main
    components: [tx_ultimate]

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

uart:
  id: uart_bus
  tx_pin: GPIO19
  rx_pin: GPIO22
  baud_rate: 115200

tx_ultimate:
  uart_id: uart_bus

  # One entry per physical zone (left → right). Omit zones to default to 4 with no callbacks.
  zones:
    - on_tap:
        - logger.log: "Zone 1 tap"
      on_hold:
        - logger.log: "Zone 1 hold"
      on_double_tap:
        - logger.log: "Zone 1 double tap"
    - on_tap:
        - logger.log: "Zone 2 tap"
      on_hold:
        - logger.log: "Zone 2 hold"
      on_double_tap:
        - logger.log: "Zone 2 double tap"
    - on_tap:
        - logger.log: "Zone 3 tap"
      on_hold:
        - logger.log: "Zone 3 hold"
      on_double_tap:
        - logger.log: "Zone 3 double tap"
    - on_tap:
        - logger.log: "Zone 4 tap"
      on_hold:
        - logger.log: "Zone 4 hold"
      on_double_tap:
        - logger.log: "Zone 4 double tap"

  on_swipe_left:
    - logger.log: "Swipe left"

  on_swipe_right:
    - logger.log: "Swipe right"

  on_two_finger:
    - logger.log: "Two-finger gesture"
